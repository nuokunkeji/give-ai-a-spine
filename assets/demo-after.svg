<svg xmlns="http://www.w3.org/2000/svg" width="1640" height="1640" viewBox="0 0 1640 1640" role="img" aria-labelledby="title desc">
  <title id="title">With Spine</title>
  <desc id="desc">The assistant separates the announcement from the decision and defines a paid-demand gate.</desc>
  <rect width="1640" height="840" rx="44" fill="#171717"/>
  <rect x="54" y="48" width="260" height="62" rx="31" fill="#2C4A3A"/>
  <text x="92" y="91" fill="#F7F1E8" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">WITH SPINE</text>
  <text x="56" y="170" fill="#9C948A" font-family="ui-monospace, Menlo, monospace" font-size="25">REALITY CHECK</text>
  <text x="56" y="226" fill="#F7F1E8" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="600">
    <tspan x="56" dy="0">Three friends are a small, non-representative sample.</tspan>
    <tspan x="56" dy="48">Their enthusiasm shows interest, not strong validation.</tspan>
  </text>
  <rect x="54" y="330" width="1532" height="354" rx="28" fill="#222222" stroke="#3F5F4D" stroke-width="3"/>
  <text x="96" y="390" fill="#8DC7A5" font-family="ui-monospace, Menlo, monospace" font-size="25">EVIDENCE GATE</text>
  <text x="96" y="452" fill="#F7F1E8" font-family="Inter, Arial, sans-serif" font-size="32">
    <tspan x="96" dy="0">Before quitting, test with 10–20 target users.</tspan>
    <tspan x="96" dy="52" fill="#8DC7A5" font-weight="700">Require at least five to pay</tspan>
    <tspan x="96" dy="52" fill="#8DC7A5" font-weight="700">or commit in writing by a fixed date.</tspan>
    <tspan x="96" dy="52">Then decide from that evidence and your financial runway.</tspan>
  </text>
  <circle cx="80" cy="760" r="13" fill="#8DC7A5"/>
  <text x="110" y="772" fill="#CFC7BA" font-family="Inter, Arial, sans-serif" font-size="30">Artifact separated from decision.</text>
</svg>
